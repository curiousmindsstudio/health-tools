<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator | Health Tools</title>
  <style>
    /* ===== Global ===== */
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #f7971e, #ffd200);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    /* ===== Card Container ===== */
    .age-card {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    input[type=date] {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      margin-top: 10px;
      background-color: #f39c12;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #e67e22;
    }

    #ageResult {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    /* ===== Footer ===== */
    footer {
      margin-top: 40px;
      padding: 15px;
      text-align: center;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>🎂 Age Calculator</h1>

  <div class="age-card">
    <p>Enter your date of birth:</p>
    <input type="date" id="dob">
    <button onclick="calculateAge()">Calculate Age</button>
    <p id="ageResult"></p>
  </div>

  <footer>
    <a href="index.html" style="color:white; text-decoration:none;">⬅ Back to Health Tools Hub</a>
  </footer>

  <script>
    function calculateAge() {
      let dobInput = document.getElementById("dob").value;
      if (!dobInput) {
        document.getElementById("ageResult").innerHTML = "Please select your date of birth!";
        return;
      }

      let dob = new Date(dobInput);
      let today = new Date();

      let years = today.getFullYear() - dob.getFullYear();
      let months = today.getMonth() - dob.getMonth();
      let days = today.getDate() - dob.getDate();

      if (days < 0) {
        months -= 1;
        days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
      }

      if (months < 0) {
        years -= 1;
        months += 12;
      }

      document.getElementById("ageResult").innerHTML = 
        `You are ${years} year(s) and ${months} month(s) old.`;
    }
  </script>

</body>
</html>
