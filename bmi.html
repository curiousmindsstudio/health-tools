<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator | Health Tools</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    p.description {
      text-align: center;
      max-width: 400px;
      color: #fff;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .bmi-card {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    input[type=number] {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      padding: 12px 25px;
      margin-top: 10px;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #45a049;
    }
    #bmiResult {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
    #advice {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
    }
    .underweight { color: #3498db; }
    .normal { color: #27ae60; }
    .overweight { color: #f39c12; }
    .obese { color: #e74c3c; }
    footer {
      margin-top: 40px;
      padding: 15px;
      text-align: center;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>🏥 BMI Calculator</h1>
  <p class="description">
    BMI (Body Mass Index) is a rough estimate of body fat based on your height and weight. 
    It may not be accurate for athletes, pregnant women, or people with high muscle mass.
  </p>

  <div class="bmi-card">
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <button onclick="calculateBMI()">Calculate BMI</button>
    <p id="bmiResult"></p>
    <p id="advice"></p>
  </div>

  <footer>
    <a href="index.html" style="color:white; text-decoration:none;">⬅ Back to Health Tools Hub</a>
  </footer>

  <script>
    function calculateBMI() {
      let w = parseFloat(document.getElementById("weight").value);
      let h = parseFloat(document.getElementById("height").value)/100;

      if (!w || !h) {
        document.getElementById("bmiResult").innerText = "Please enter valid numbers!";
        document.getElementById("bmiResult").className = "";
        document.getElementById("advice").innerText = "";
        return;
      }

      let bmi = w / (h*h);
      bmi = bmi.toFixed(1);

      let category = "";
      let advice = "";
      let className = "";

      if (bmi < 18.5) {
        category = "Underweight";
        advice = "You may need to eat more nutritious food.";
        className = "underweight";
      } else if (bmi >= 18.5 && bmi < 25) {
        category = "Normal";
        advice = "Your weight is in a healthy range.";
        className = "normal";
      } else if (bmi >= 25 && bmi < 30) {
        category = "Overweight";
        advice = "Consider a balanced diet and regular exercise.";
        className = "overweight";
      } else {
        category = "Obese";
        advice = "Consult a doctor or dietitian for guidance.";
        className = "obese";
      }

      document.getElementById("bmiResult").innerText = `BMI: ${bmi} — ${category}`;
      document.getElementById("bmiResult").className = className;
      document.getElementById("advice").innerText = advice;
    }
  </script>

</body>
  </html>
